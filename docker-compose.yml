services:
  # 1. Banco de Dados PostgreSQL (O Arquivo Digital)
  # Responsável por armazenar o histórico de documentos processados.
  db:
    image: postgres:15
    container_name: juridiques-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Juridiques2026
      POSTGRES_DB: juridiques_zero
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - juridiques-network

  # 2. IA Local Ollama (O Cérebro)
  # Executa o modelo Phi-3 localmente, garantindo privacidade jurídica.
  ollama:
    image: ollama/ollama:latest
    container_name: juridiques-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - juridiques-network

  # 3. Backend FastAPI (O Motor)
  # Orquestra a extração de PDFs, chamadas à IA e gravação no banco.
  api:
    build: .
    command: python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - ollama
    networks:
      - juridiques-network

  # 4. Interface Streamlit (A Vitrine)
  # Interface web amigável para interação com o usuário final.
  interface:
    build: .
    command: streamlit run interface.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api
    env_file:
      - .env
    networks:
      - juridiques-network

# Volumes persistentes para evitar perda de dados e modelos ao reiniciar containers
volumes:
  postgres_data:
  ollama_data:

# Rede interna para comunicação segura entre os serviços
networks:
  juridiques-network:
    driver: bridge
